name: Dependency audit

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 1'

jobs:
  npm-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev
