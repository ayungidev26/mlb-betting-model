name: Schedule Pipeline Refresh

on:
  schedule:
    # Stats refresh (early morning ET window coverage)
    - cron: "30 09 * * *" # 05:30 ET (EDT)
    - cron: "30 10 * * *" # 05:30 ET (EST)
    - cron: "30 12 * * *" # 08:30 ET (EDT)
    - cron: "30 13 * * *" # 08:30 ET (EST)
    # Market refresh windows (unchanged)
    - cron: "19 14 * * *" # 10:19 ET (EDT)
    - cron: "19 15 * * *" # 10:19 ET (EST)
    - cron: "19 18 * * *" # 14:19 ET (EDT)
    - cron: "19 19 * * *" # 14:19 ET (EST)
    - cron: "19 21 * * *" # 17:19 ET (EDT)
    - cron: "19 22 * * *" # 17:19 ET (EST)
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Which pipeline to run when triggered manually"
        required: true
        default: both
        type: choice
        options:
          - both
          - stats
          - market

concurrency:
  group: pipeline-refresh-scheduler
  cancel-in-progress: true

jobs:
  refresh-stats:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.pipeline == 'both' || github.event.inputs.pipeline == 'stats'
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate ET execution window (stats)
        id: gate
        run: |
          node <<'NODE'
          const fs = require("node:fs")

          const now = new Date()
          const formatter = new Intl.DateTimeFormat("en-US", {
            timeZone: "America/New_York",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false
          })

          const parts = Object.fromEntries(
            formatter
              .formatToParts(now)
              .filter((part) => part.type !== "literal")
              .map((part) => [part.type, part.value])
          )

          const hour = Number(parts.hour)
          const minute = Number(parts.minute)
          const minuteOfDay = hour * 60 + minute
          const etTimestamp = `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second} ET`

          const window = {
            label: "5:30 AM → 8:30 AM ET",
            start: 5 * 60 + 30,
            end: 8 * 60 + 30
          }

          console.log(`Current ET time: ${etTimestamp}`)

          if (process.env.GITHUB_EVENT_NAME === "workflow_dispatch") {
            console.log("Manual run detected — bypassing time window gate")
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=true\n`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matched_window=manual_dispatch\n`)
          } else if (minuteOfDay >= window.start && minuteOfDay <= window.end) {
            console.log(`Matched execution window: ${window.label}`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=true\n`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matched_window=${window.label}\n`)
          } else {
            console.log("Skipping run — outside allowed execution window")
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=false\n`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matched_window=none\n`)
          }
          NODE

      - name: Trigger stats pipeline
        if: steps.gate.outputs.should_run == 'true'
        env:
          PIPELINE_BASE_URL: ${{ secrets.PIPELINE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ADMIN_API_SECRET: ${{ secrets.ADMIN_API_SECRET }}
          PIPELINE_AUTH_TOKEN: ${{ secrets.PIPELINE_AUTH_TOKEN }}
        run: |
          echo "Proceeding with stats pipeline trigger inside window: ${{ steps.gate.outputs.matched_window }}"

          if [[ -z "$PIPELINE_BASE_URL" ]]; then
            echo "Missing required GitHub Actions secret: PIPELINE_BASE_URL"
            exit 1
          fi

          CLEAN_CRON_SECRET="$(printf %s "$CRON_SECRET" | tr -d "\r\n")"
          CLEAN_ADMIN_API_SECRET="$(printf %s "$ADMIN_API_SECRET" | tr -d "\r\n")"
          CLEAN_PIPELINE_AUTH_TOKEN="$(printf %s "${PIPELINE_AUTH_TOKEN:-$ADMIN_API_SECRET}" | tr -d "\r\n")"

          if [[ -n "$CLEAN_CRON_SECRET" ]]; then
            ENDPOINT_URL="${PIPELINE_BASE_URL%/}/api/cron/runDailyStatsPipeline"
            curl --fail-with-body --show-error --silent \
              --request POST \
              --header "Authorization: Bearer ${CLEAN_CRON_SECRET}" \
              --header "Content-Type: application/json" \
              "$ENDPOINT_URL"
          else
            if [[ -z "$CLEAN_ADMIN_API_SECRET" || -z "$CLEAN_PIPELINE_AUTH_TOKEN" ]]; then
              echo "Missing auth secrets for stats trigger. Set CRON_SECRET or ADMIN_API_SECRET (and optional PIPELINE_AUTH_TOKEN)."
              exit 1
            fi

            ENDPOINT_URL="${PIPELINE_BASE_URL%/}/api/runStatsPipeline"
            curl --fail-with-body --show-error --silent \
              --request POST \
              --header "Authorization: Bearer ${CLEAN_PIPELINE_AUTH_TOKEN}" \
              --header "x-admin-secret: ${CLEAN_ADMIN_API_SECRET}" \
              --header "Content-Type: application/json" \
              --data "{\"authToken\":\"${CLEAN_PIPELINE_AUTH_TOKEN}\",\"adminSecret\":\"${CLEAN_ADMIN_API_SECRET}\"}" \
              "$ENDPOINT_URL"
          fi

      - name: Skip stats run (outside allowed execution window)
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Skipping stats pipeline — outside allowed execution window"

  refresh-market:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.pipeline == 'both' || github.event.inputs.pipeline == 'market'
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate ET execution window (market)
        id: gate
        run: |
          node <<'NODE'
          const fs = require("node:fs")

          const now = new Date()
          const formatter = new Intl.DateTimeFormat("en-US", {
            timeZone: "America/New_York",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false
          })

          const parts = Object.fromEntries(
            formatter
              .formatToParts(now)
              .filter((part) => part.type !== "literal")
              .map((part) => [part.type, part.value])
          )

          const hour = Number(parts.hour)
          const minute = Number(parts.minute)
          const minuteOfDay = hour * 60 + minute
          const etTimestamp = `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second} ET`

          const windows = [
            {
              label: "10:19 AM → 11:49 AM ET",
              start: 10 * 60 + 19,
              end: 11 * 60 + 49
            },
            {
              label: "2:19 PM → 3:49 PM ET",
              start: 14 * 60 + 19,
              end: 15 * 60 + 49
            },
            {
              label: "5:19 PM → 6:49 PM ET",
              start: 17 * 60 + 19,
              end: 18 * 60 + 49
            }
          ]

          const matchedWindow = windows.find(
            (window) => minuteOfDay >= window.start && minuteOfDay <= window.end
          )

          console.log(`Current ET time: ${etTimestamp}`)

          if (process.env.GITHUB_EVENT_NAME === "workflow_dispatch") {
            console.log("Manual run detected — bypassing time window gate")
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=true\n`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matched_window=manual_dispatch\n`)
          } else if (matchedWindow) {
            console.log(`Matched execution window: ${matchedWindow.label}`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=true\n`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matched_window=${matchedWindow.label}\n`)
          } else {
            console.log("Skipping run — outside allowed execution window")
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=false\n`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matched_window=none\n`)
          }
          NODE

      - name: Trigger market pipeline
        if: steps.gate.outputs.should_run == 'true'
        env:
          PIPELINE_BASE_URL: ${{ secrets.PIPELINE_BASE_URL }}
          ADMIN_API_SECRET: ${{ secrets.ADMIN_API_SECRET }}
          PIPELINE_AUTH_TOKEN: ${{ secrets.PIPELINE_AUTH_TOKEN }}
        run: |
          echo "Proceeding with market pipeline trigger inside window: ${{ steps.gate.outputs.matched_window }}"

          if [[ -z "$PIPELINE_BASE_URL" || -z "$ADMIN_API_SECRET" ]]; then
            echo "Missing required GitHub Actions secrets: PIPELINE_BASE_URL and/or ADMIN_API_SECRET"
            exit 1
          fi

          ENDPOINT_URL="${PIPELINE_BASE_URL%/}/api/runPipeline"
          CLEAN_ADMIN_API_SECRET="$(printf %s "$ADMIN_API_SECRET" | tr -d "\r\n")"
          CLEAN_PIPELINE_AUTH_TOKEN="$(printf %s "${PIPELINE_AUTH_TOKEN:-$ADMIN_API_SECRET}" | tr -d "\r\n")"

          if [[ -z "$CLEAN_ADMIN_API_SECRET" || -z "$CLEAN_PIPELINE_AUTH_TOKEN" ]]; then
            echo "Sanitized auth secret is empty; re-save ADMIN_API_SECRET (and optional PIPELINE_AUTH_TOKEN) without newlines."
            exit 1
          fi

          attempt=1
          max_attempts=3
          response_file="$(mktemp)"

          while (( attempt <= max_attempts )); do
            if curl --fail-with-body --show-error --silent \
              --request POST \
              --max-redirs 0 \
              --header "Authorization: Bearer ${CLEAN_PIPELINE_AUTH_TOKEN}" \
              --header "x-admin-secret: ${CLEAN_ADMIN_API_SECRET}" \
              --header "Content-Type: application/json" \
              --data "{\"authToken\":\"${CLEAN_PIPELINE_AUTH_TOKEN}\",\"adminSecret\":\"${CLEAN_ADMIN_API_SECRET}\"}" \
              "$ENDPOINT_URL" > "$response_file"; then
              cat "$response_file"
              rm -f "$response_file"
              exit 0
            fi

            cat "$response_file"

            if grep -q '"code":"COOLDOWN_ACTIVE"' "$response_file"; then
              retry_after_seconds="$(( attempt * 30 ))"

              if (( attempt < max_attempts )); then
                echo "Cooldown active. Waiting ${retry_after_seconds}s before retry ${attempt}/${max_attempts}."
                sleep "$retry_after_seconds"
                ((attempt += 1))
                continue
              fi
            fi

            echo "Pipeline request failed on attempt ${attempt}/${max_attempts}."
            rm -f "$response_file"
            exit 1
          done

          rm -f "$response_file"
          exit 1

      - name: Skip market run (outside allowed execution window)
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Skipping market pipeline — outside allowed execution window"
