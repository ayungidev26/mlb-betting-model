name: Schedule Pipeline Refresh

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: pipeline-refresh-scheduler
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Determine whether this is a target Eastern time
        id: gate
        run: |
          ET_HOUR="$(TZ=America/New_York date +%H)"

          if [[ "$ET_HOUR" == "10" || "$ET_HOUR" == "15" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger pipeline
        if: steps.gate.outputs.should_run == 'true'
        env:
          PIPELINE_BASE_URL: ${{ secrets.PIPELINE_BASE_URL }}
          ADMIN_API_SECRET: ${{ secrets.ADMIN_API_SECRET }}
          PIPELINE_AUTH_TOKEN: ${{ secrets.PIPELINE_AUTH_TOKEN }}
        run: |
          if [[ -z "$PIPELINE_BASE_URL" || -z "$ADMIN_API_SECRET" ]]; then
            echo "Missing required GitHub Actions secrets: PIPELINE_BASE_URL and/or ADMIN_API_SECRET"
            exit 1
          fi

          # Avoid auth header stripping on HTTP redirects by calling the final
          # endpoint directly and treating redirects as configuration issues.
          ENDPOINT_URL="${PIPELINE_BASE_URL%/}/api/runPipeline"

          # Normalize potential CR/LF from copied secrets so headers stay valid.
          CLEAN_ADMIN_API_SECRET="$(printf %s "$ADMIN_API_SECRET" | tr -d "\r\n")"
          CLEAN_PIPELINE_AUTH_TOKEN="$(printf %s "${PIPELINE_AUTH_TOKEN:-$ADMIN_API_SECRET}" | tr -d "\r\n")"

          if [[ -z "$CLEAN_ADMIN_API_SECRET" || -z "$CLEAN_PIPELINE_AUTH_TOKEN" ]]; then
            echo "Sanitized auth secret is empty; re-save ADMIN_API_SECRET (and optional PIPELINE_AUTH_TOKEN) without newlines."
            exit 1
          fi

          attempt=1
          max_attempts=3
          response_file="$(mktemp)"

          while (( attempt <= max_attempts )); do
            if curl --fail-with-body --show-error --silent \
              --request POST \
              --max-redirs 0 \
              --header "Authorization: Bearer ${CLEAN_PIPELINE_AUTH_TOKEN}" \
              --header "x-admin-secret: ${CLEAN_ADMIN_API_SECRET}" \
              --header "Content-Type: application/json" \
              --data "{\"authToken\":\"${CLEAN_PIPELINE_AUTH_TOKEN}\",\"adminSecret\":\"${CLEAN_ADMIN_API_SECRET}\"}" \
              "$ENDPOINT_URL" > "$response_file"; then
              cat "$response_file"
              rm -f "$response_file"
              exit 0
            fi

            cat "$response_file"

            if grep -q '"code":"COOLDOWN_ACTIVE"' "$response_file"; then
              retry_after_seconds="$(
                python3 - "$response_file" <<'PY'
          import json
          import sys

          payload_path = sys.argv[1]
          text = open(payload_path, "r", encoding="utf-8").read()
          retry_after = None
          decoder = json.JSONDecoder()
          index = 0

          while index < len(text):
              while index < len(text) and text[index].isspace():
                  index += 1
              if index >= len(text):
                  break
              try:
                  payload, next_index = decoder.raw_decode(text, index)
              except json.JSONDecodeError:
                  break
              index = next_index
              for step in payload.get("steps", []):
                  step_result = step.get("result") or {}
                  if step_result.get("code") == "COOLDOWN_ACTIVE":
                      retry_after = step_result.get("retryAfterSeconds")
                      break
              if retry_after is not None:
                  break

          if isinstance(retry_after, (int, float)):
              print(max(1, int(retry_after)))
          PY
              )"

              if [[ -z "$retry_after_seconds" ]]; then
                retry_after_seconds=30
              fi

              if (( attempt < max_attempts )); then
                echo "Cooldown active. Waiting ${retry_after_seconds}s before retry ${attempt}/${max_attempts}."
                sleep "$retry_after_seconds"
                ((attempt += 1))
                continue
              fi
            fi

            echo "Pipeline request failed on attempt ${attempt}/${max_attempts}."
            rm -f "$response_file"
            exit 1
          done

          rm -f "$response_file"
          exit 1

      - name: Skip (non-target hour)
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Not 10:00 or 15:00 America/New_York; skipping."
