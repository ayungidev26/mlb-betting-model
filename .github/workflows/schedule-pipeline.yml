name: Schedule Pipeline Refresh

on:
  schedule:
    # GitHub Actions cron is UTC; include both EST and EDT UTC offsets so
    # these remain fixed at 10:19, 14:19, and 17:19 America/New_York year-round.
    - cron: "19 14 * * *" # 10:19 ET (EDT)
    - cron: "19 15 * * *" # 10:19 ET (EST)
    - cron: "19 18 * * *" # 14:19 ET (EDT)
    - cron: "19 19 * * *" # 14:19 ET (EST)
    - cron: "19 21 * * *" # 17:19 ET (EDT)
    - cron: "19 22 * * *" # 17:19 ET (EST)
  workflow_dispatch:

concurrency:
  group: pipeline-refresh-scheduler
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate ET execution window
        id: gate
        run: |
          node <<'NODE'
          const fs = require("node:fs")

          const now = new Date()
          const formatter = new Intl.DateTimeFormat("en-US", {
            timeZone: "America/New_York",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false
          })

          const parts = Object.fromEntries(
            formatter
              .formatToParts(now)
              .filter((part) => part.type !== "literal")
              .map((part) => [part.type, part.value])
          )

          const hour = Number(parts.hour)
          const minute = Number(parts.minute)
          const minuteOfDay = hour * 60 + minute
          const etTimestamp = `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second} ET`

          const windows = [
            {
              label: "10:19 AM → 11:49 AM ET",
              start: 10 * 60 + 19,
              end: 11 * 60 + 49
            },
            {
              label: "2:19 PM → 3:49 PM ET",
              start: 14 * 60 + 19,
              end: 15 * 60 + 49
            },
            {
              label: "5:19 PM → 6:49 PM ET",
              start: 17 * 60 + 19,
              end: 18 * 60 + 49
            }
          ]

          const matchedWindow = windows.find(
            (window) => minuteOfDay >= window.start && minuteOfDay <= window.end
          )

          console.log(`Current ET time: ${etTimestamp}`)

          if (matchedWindow) {
            console.log(`Matched execution window: ${matchedWindow.label}`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=true\n`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matched_window=${matchedWindow.label}\n`)
          } else {
            console.log("Skipping run — outside allowed execution window")
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=false\n`)
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `matched_window=none\n`)
          }
          NODE

      - name: Trigger pipeline
        if: steps.gate.outputs.should_run == 'true'
        env:
          PIPELINE_BASE_URL: ${{ secrets.PIPELINE_BASE_URL }}
          ADMIN_API_SECRET: ${{ secrets.ADMIN_API_SECRET }}
          PIPELINE_AUTH_TOKEN: ${{ secrets.PIPELINE_AUTH_TOKEN }}
        run: |
          echo "Proceeding with pipeline trigger inside window: ${{ steps.gate.outputs.matched_window }}"

          if [[ -z "$PIPELINE_BASE_URL" || -z "$ADMIN_API_SECRET" ]]; then
            echo "Missing required GitHub Actions secrets: PIPELINE_BASE_URL and/or ADMIN_API_SECRET"
            exit 1
          fi

          # Avoid auth header stripping on HTTP redirects by calling the final
          # endpoint directly and treating redirects as configuration issues.
          ENDPOINT_URL="${PIPELINE_BASE_URL%/}/api/runPipeline"

          # Normalize potential CR/LF from copied secrets so headers stay valid.
          CLEAN_ADMIN_API_SECRET="$(printf %s "$ADMIN_API_SECRET" | tr -d "\r\n")"
          CLEAN_PIPELINE_AUTH_TOKEN="$(printf %s "${PIPELINE_AUTH_TOKEN:-$ADMIN_API_SECRET}" | tr -d "\r\n")"

          if [[ -z "$CLEAN_ADMIN_API_SECRET" || -z "$CLEAN_PIPELINE_AUTH_TOKEN" ]]; then
            echo "Sanitized auth secret is empty; re-save ADMIN_API_SECRET (and optional PIPELINE_AUTH_TOKEN) without newlines."
            exit 1
          fi

          attempt=1
          max_attempts=3
          response_file="$(mktemp)"

          while (( attempt <= max_attempts )); do
            if curl --fail-with-body --show-error --silent \
              --request POST \
              --max-redirs 0 \
              --header "Authorization: Bearer ${CLEAN_PIPELINE_AUTH_TOKEN}" \
              --header "x-admin-secret: ${CLEAN_ADMIN_API_SECRET}" \
              --header "Content-Type: application/json" \
              --data "{\"authToken\":\"${CLEAN_PIPELINE_AUTH_TOKEN}\",\"adminSecret\":\"${CLEAN_ADMIN_API_SECRET}\"}" \
              "$ENDPOINT_URL" > "$response_file"; then
              cat "$response_file"
              rm -f "$response_file"
              exit 0
            fi

            cat "$response_file"

            if grep -q '"code":"COOLDOWN_ACTIVE"' "$response_file"; then
              retry_after_seconds="$(
                python3 - "$response_file" <<'PY'
          import json
          import sys

          payload_path = sys.argv[1]
          text = open(payload_path, "r", encoding="utf-8").read()
          retry_after = None
          decoder = json.JSONDecoder()
          index = 0

          while index < len(text):
              while index < len(text) and text[index].isspace():
                  index += 1
              if index >= len(text):
                  break
              try:
                  payload, next_index = decoder.raw_decode(text, index)
              except json.JSONDecodeError:
                  break
              index = next_index
              for step in payload.get("steps", []):
                  step_result = step.get("result") or {}
                  if step_result.get("code") == "COOLDOWN_ACTIVE":
                      retry_after = step_result.get("retryAfterSeconds")
                      break
              if retry_after is not None:
                  break

          if isinstance(retry_after, (int, float)):
              print(max(1, int(retry_after)))
          PY
              )"

              if [[ -z "$retry_after_seconds" ]]; then
                retry_after_seconds=30
              fi

              if (( attempt < max_attempts )); then
                echo "Cooldown active. Waiting ${retry_after_seconds}s before retry ${attempt}/${max_attempts}."
                sleep "$retry_after_seconds"
                ((attempt += 1))
                continue
              fi
            fi

            echo "Pipeline request failed on attempt ${attempt}/${max_attempts}."
            rm -f "$response_file"
            exit 1
          done

          rm -f "$response_file"
          exit 1

      - name: Skip (outside allowed execution window)
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Skipping run — outside allowed execution window"
