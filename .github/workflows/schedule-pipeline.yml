name: Schedule Pipeline Refresh

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: pipeline-refresh-scheduler
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Determine whether this is a target Eastern time
        id: gate
        run: |
          ET_HOUR="$(TZ=America/New_York date +%H)"

          if [[ "$ET_HOUR" == "10" || "$ET_HOUR" == "15" || "$ET_HOUR" == "21" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger pipeline
        if: steps.gate.outputs.should_run == 'true'
        env:
          PIPELINE_BASE_URL: ${{ secrets.PIPELINE_BASE_URL }}
          ADMIN_API_SECRET: ${{ secrets.ADMIN_API_SECRET }}
        run: |
          if [[ -z "$PIPELINE_BASE_URL" || -z "$ADMIN_API_SECRET" ]]; then
            echo "Missing required GitHub Actions secrets: PIPELINE_BASE_URL and/or ADMIN_API_SECRET"
            exit 1
          fi

          # Avoid auth header stripping on HTTP redirects by calling the final
          # endpoint directly and treating redirects as configuration issues.
          ENDPOINT_URL="${PIPELINE_BASE_URL%/}/api/runPipeline"

          curl --fail-with-body --show-error --silent \
            --request POST \
            --max-redirs 0 \
            --retry 2 \
            --retry-delay 5 \
            --header "Authorization: Bearer ${ADMIN_API_SECRET}" \
            --header "Content-Type: application/json" \
            "$ENDPOINT_URL"

      - name: Skip (non-target hour)
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Not 10:00, 15:00, or 21:00 America/New_York; skipping."
